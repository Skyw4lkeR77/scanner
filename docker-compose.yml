version: "3.8"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - redis
    volumes:
      - ./data:/app/data
      - scan-outputs:/tmp/scanner-outputs
    restart: unless-stopped
    command: >
      sh -c "cd backend && python seed.py &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build: .
    env_file: .env
    depends_on:
      - redis
    volumes:
      - ./data:/app/data
      - scan-outputs:/tmp/scanner-outputs
    restart: unless-stopped
    command: >
      sh -c "cd backend && python worker.py"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
  scan-outputs:
